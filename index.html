<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Strait Ultimatum — Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300&family=Barlow+Condensed:wght@400;600;700&family=Noto+Sans+Thai:wght@400;600;700&family=Noto+Sans+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
 
:root{
  --bg:#0b0b0d;--bg2:#111114;--surface:#16161a;--surface2:#1e1e24;
  --ink:#f0ede8;--ink2:#b8b4ae;--ink3:#787470;--ink4:#4a4844;
  --rule:rgba(240,237,232,.08);--rule2:rgba(240,237,232,.14);
  --accent:#e85d20;--accent2:#f0a030;--blue:#3a8fd4;--green:#3cb872;--red:#d43a3a;
  --neon:#39ff6a;--spine:#2a2a30;--node:#1e1e24;
  --node-ring:rgba(240,237,232,.15);--card:#16161a;
  --card-border:rgba(240,237,232,.08);--tag-bg:rgba(240,237,232,.07);--nav:#0b0b0d;
  --serif:'Bebas Neue',impact,sans-serif;
  --body:'Barlow','Noto Sans Thai','Noto Sans SC',sans-serif;
  --cond:'Barlow Condensed','Noto Sans Thai','Noto Sans SC',sans-serif;
}
[data-theme="light"]{
  --bg:#f2efe9;--bg2:#ebe7e0;--surface:#ffffff;--surface2:#f7f4ef;
  --ink:#181612;--ink2:#3d3a34;--ink3:#7a7570;--ink4:#b0ada8;
  --rule:rgba(24,22,18,.09);--rule2:rgba(24,22,18,.16);
  --accent:#c44a0c;--accent2:#c07a00;--blue:#1a6db0;--green:#1e8f50;--red:#b82020;
  --spine:#d8d4cc;--node:#f2efe9;--node-ring:rgba(24,22,18,.2);
  --card:#ffffff;--card-border:rgba(24,22,18,.1);--tag-bg:rgba(24,22,18,.06);--nav:#f2efe9;
}
 
body{font-family:var(--body);background:var(--bg);color:var(--ink);transition:background .3s,color .3s;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
body.lang-th{font-family:'Noto Sans Thai',var(--body)}
body.lang-zh{font-family:'Noto Sans SC',var(--body)}
 
/* ── BG CANVAS ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.35}
[data-theme="light"] #bg-canvas{opacity:.18}
 
/* ── page wrapper keeps z above canvas ── */
.page-wrap{position:relative;z-index:1}
 
/* ── NAV ── */
nav{
  position:sticky;top:0;z-index:200;
  background:var(--nav);border-bottom:1px solid var(--rule);
  height:52px;display:flex;align-items:center;
  padding:0 clamp(16px,4vw,48px);gap:12px;justify-content:space-between;
  backdrop-filter:blur(16px);
}
.nav-logo{font-family:var(--cond);font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3)}
.nav-right{display:flex;align-items:center;gap:6px}
.nbtn{background:none;border:1px solid transparent;border-radius:4px;padding:4px 10px;cursor:pointer;font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3);transition:all .15s}
.nbtn:hover{border-color:var(--rule2);color:var(--ink)}
.nbtn.on{background:var(--accent);color:#fff;border-color:transparent}
.tsep{width:1px;height:18px;background:var(--rule2);margin:0 2px}
.tbtn{background:none;border:1px solid var(--rule2);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:transform .2s;color:var(--ink2)}
.tbtn:hover{transform:rotate(15deg) scale(1.08)}
 
/* ── HERO ── */
.hero{max-width:900px;margin:0 auto;padding:clamp(48px,8vw,96px) clamp(20px,5vw,48px) 0;position:relative;overflow:visible}
.hero-eyebrow{font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.hero-eyebrow::before{content:'';display:block;width:32px;height:2px;background:var(--accent)}
.hero-hed{font-family:var(--serif);font-size:clamp(56px,9vw,120px);line-height:.95;letter-spacing:.01em;color:var(--ink);position:relative;z-index:2}
body.lang-th .hero-hed{font-family:'Noto Sans Thai',sans-serif;font-weight:700;font-size:clamp(38px,7vw,80px);line-height:1.1}
body.lang-zh .hero-hed{font-family:'Noto Sans SC',sans-serif;font-weight:700;font-size:clamp(42px,7vw,90px);line-height:1.05}
.hero-hed .acc{color:var(--accent)}
.hero-sub{font-family:var(--body);font-size:clamp(15px,1.8vw,18px);font-weight:300;line-height:1.7;color:var(--ink2);max-width:580px;margin-top:20px;padding-top:20px;border-top:1px solid var(--rule2);position:relative;z-index:2}
body.lang-th .hero-sub,body.lang-zh .hero-sub{font-size:14px;line-height:1.8}
 
/* hero art — radar globe, bigger, animated */
.hero-art{position:absolute;right:clamp(-20px,0vw,0px);top:20px;pointer-events:none;z-index:1}
[data-theme="light"] .hero-art svg{opacity:.07}
.hero-art svg{opacity:.12}
 
/* spinning ring animation */
@keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spin-rev{from{transform:rotate(0deg)}to{transform:rotate(-360deg)}}
@keyframes pulse-ring{0%,100%{opacity:.4}50%{opacity:.9}}
@keyframes radar-sweep{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes float-up{0%{transform:translateY(0) scaleX(1)}50%{transform:translateY(-4px) scaleX(.98)}100%{transform:translateY(0) scaleX(1)}}
@keyframes dash-move{from{stroke-dashoffset:0}to{stroke-dashoffset:-24}}
@keyframes glow-pulse{0%,100%{opacity:.6;filter:blur(0px)}50%{opacity:1;filter:blur(1px)}}
 
.radar-ring1{transform-origin:160px 160px;animation:spin-slow 12s linear infinite}
.radar-ring2{transform-origin:160px 160px;animation:spin-rev 18s linear infinite}
.radar-sweep-line{transform-origin:160px 160px;animation:radar-sweep 4s linear infinite}
 
/* ── SCENE BANNER — between hero and stats ── */
.scene-banner{
  max-width:900px;margin:32px auto 0;
  padding:0 clamp(20px,5vw,48px);
}
.scene-banner svg{width:100%;height:auto;display:block}
 
/* ── STAT BAR ── */
.statbar{max-width:900px;margin:0 auto;padding:0 clamp(20px,5vw,48px);display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--rule2);border-bottom:1px solid var(--rule2)}
.sitem{padding:22px 0;text-align:center;border-right:1px solid var(--rule)}
.sitem:last-child{border-right:none}
.snum{font-family:var(--serif);font-size:clamp(32px,5vw,52px);line-height:1;margin-bottom:4px}
body.lang-th .snum,body.lang-zh .snum{font-family:var(--cond);font-weight:700;font-size:clamp(26px,4vw,40px)}
.snum.a{color:var(--accent)}.snum.b{color:var(--blue)}.snum.r{color:var(--red)}.snum.g{color:var(--green)}
.slbl{font-family:var(--cond);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink3);line-height:1.4}
body.lang-th .slbl,body.lang-zh .slbl{font-family:'Noto Sans Thai','Noto Sans SC',sans-serif;font-size:10px;letter-spacing:.02em;text-transform:none}
 
/* ── TIMELINE LABEL ── */
.tl-label{max-width:900px;margin:0 auto;padding:clamp(40px,6vw,64px) clamp(20px,5vw,48px) 0;display:flex;align-items:center;gap:16px}
.tl-label-text{font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);white-space:nowrap}
.tl-label-line{flex:1;height:1px;background:var(--rule2)}
 
/* ── TIMELINE ── */
.timeline{max-width:900px;margin:0 auto;padding:0 clamp(20px,5vw,48px) 80px;position:relative}
 
/* spine — gradient glow */
.timeline::before{
  content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;
  background:linear-gradient(to bottom,transparent,var(--spine) 8%,var(--spine) 92%,transparent);
  transform:translateX(-50%);
}
/* neon glow layer on spine */
.timeline::after{
  content:'';position:absolute;left:50%;top:0;bottom:0;width:6px;
  background:linear-gradient(to bottom,transparent,rgba(232,93,32,.12) 20%,rgba(58,143,212,.12) 50%,rgba(60,184,114,.12) 80%,transparent);
  transform:translateX(-50%);filter:blur(4px);pointer-events:none;
}
[data-theme="light"] .timeline::after{display:none}
 
/* ── EVENT ── */
.event{position:relative;display:grid;grid-template-columns:1fr 64px 1fr;align-items:start;padding:clamp(28px,4vw,48px) 0}
.event .event-left{grid-column:1;grid-row:1}
.event .event-node{grid-column:2;grid-row:1}
.event .event-right{grid-column:3;grid-row:1;display:none}
.event.flip .event-left{grid-column:1;display:none}
.event.flip .event-node{grid-column:2}
.event.flip .event-right{grid-column:3;display:block}
 
/* node */
.event-node{display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;z-index:2;padding-top:4px}
.node-icon{width:52px;height:52px;border-radius:50%;border:2px solid var(--node-ring);background:var(--node);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .2s,box-shadow .3s;position:relative}
.event:hover .node-icon{transform:scale(1.1)}
.node-icon.red   {border-color:var(--red);   box-shadow:0 0 0 4px rgba(212,58,58,.08),0 0 20px rgba(212,58,58,.3)}
.node-icon.amber {border-color:var(--accent2);box-shadow:0 0 0 4px rgba(240,160,48,.08),0 0 20px rgba(240,160,48,.25)}
.node-icon.blue  {border-color:var(--blue);  box-shadow:0 0 0 4px rgba(58,143,212,.08),0 0 20px rgba(58,143,212,.25)}
.node-icon.green {border-color:var(--green); box-shadow:0 0 0 4px rgba(60,184,114,.08),0 0 20px rgba(60,184,114,.25)}
[data-theme="light"] .node-icon{box-shadow:none!important}
/* pulse ring on hover */
.node-icon::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1px solid currentColor;opacity:0;transition:opacity .3s}
.event:hover .node-icon::after{opacity:.3}
 
/* card padding */
.event-left{padding:0 clamp(12px,2.5vw,28px) 0 0}
.event-right{padding:0 0 0 clamp(12px,2.5vw,28px)}
 
/* card */
.event-card{
  background:var(--card);border:1px solid var(--card-border);border-radius:12px;
  padding:clamp(16px,2.5vw,24px);position:relative;
  transition:border-color .2s,box-shadow .2s;
  overflow:hidden;
}
.event:hover .event-card{border-color:var(--rule2);box-shadow:0 8px 32px rgba(0,0,0,.18)}
[data-theme="light"] .event:hover .event-card{box-shadow:0 4px 20px rgba(0,0,0,.08)}
 
/* card watermark art */
.card-watermark{
  position:absolute;right:-10px;bottom:-10px;
  opacity:.04;pointer-events:none;z-index:0;
  transition:opacity .3s;
}
.event:hover .card-watermark{opacity:.07}
[data-theme="light"] .card-watermark{opacity:.03}
[data-theme="light"] .event:hover .card-watermark{opacity:.05}
 
/* card content above watermark */
.ev-date,.ev-hed,.ev-body,.ev-stat,.ev-tags{position:relative;z-index:1}
 
/* arrow nubs */
.event-left .event-card::after{content:'';position:absolute;right:-8px;top:24px;width:10px;height:10px;background:var(--card);border-top:1px solid var(--card-border);border-right:1px solid var(--card-border);transform:rotate(45deg);z-index:2}
.event-right .event-card::before{content:'';position:absolute;left:-8px;top:24px;width:10px;height:10px;background:var(--card);border-bottom:1px solid var(--card-border);border-left:1px solid var(--card-border);transform:rotate(45deg);z-index:2}
 
/* date */
.ev-date{font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
body.lang-th .ev-date,body.lang-zh .ev-date{letter-spacing:.04em;text-transform:none}
 
/* headline */
.ev-hed{font-family:var(--serif);font-size:clamp(22px,3vw,32px);line-height:1.05;color:var(--ink);margin-bottom:10px}
body.lang-th .ev-hed{font-family:'Noto Sans Thai',sans-serif;font-weight:700;font-size:clamp(18px,2.5vw,24px);line-height:1.25}
body.lang-zh .ev-hed{font-family:'Noto Sans SC',sans-serif;font-weight:700;font-size:clamp(18px,2.5vw,26px);line-height:1.15}
.ev-hed .accent{color:var(--accent)}.ev-hed .blue{color:var(--blue)}.ev-hed .green{color:var(--green)}.ev-hed .amber{color:var(--accent2)}
 
/* body — neon in dark */
.ev-body{font-size:clamp(13px,1.5vw,14.5px);font-weight:400;line-height:1.72;color:var(--ink2);margin-bottom:12px}
:root .ev-body{color:#39ff6a;text-shadow:0 0 8px rgba(57,255,106,.18)}
[data-theme="light"] .ev-body{color:var(--ink2);text-shadow:none}
body.lang-th .ev-body,body.lang-zh .ev-body{font-size:13px;line-height:1.8}
 
/* stat strip */
.ev-stat{display:flex;align-items:baseline;gap:6px;margin:12px 0;padding:10px 14px;background:var(--surface2);border-radius:6px;border-left:3px solid var(--accent)}
.ev-stat.blue{border-left-color:var(--blue)}.ev-stat.green{border-left-color:var(--green)}.ev-stat.amber{border-left-color:var(--accent2)}
.ev-stat-num{font-family:var(--serif);font-size:28px;line-height:1;color:var(--accent)}
body.lang-th .ev-stat-num,body.lang-zh .ev-stat-num{font-family:var(--cond);font-weight:700}
.ev-stat.blue .ev-stat-num{color:var(--blue)}.ev-stat.green .ev-stat-num{color:var(--green)}.ev-stat.amber .ev-stat-num{color:var(--accent2)}
.ev-stat-lbl{font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
body.lang-th .ev-stat-lbl,body.lang-zh .ev-stat-lbl{letter-spacing:.02em;text-transform:none}
 
/* tags */
.ev-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.ev-tag{background:var(--tag-bg);border-radius:3px;padding:3px 8px;font-family:var(--cond);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
body.lang-th .ev-tag,body.lang-zh .ev-tag{font-family:'Noto Sans Thai','Noto Sans SC',sans-serif;font-size:9px;letter-spacing:.02em;text-transform:none}
 
/* ── DIVIDER ART between events ── */
.ev-divider{display:flex;justify-content:center;align-items:center;gap:0;padding:0;position:relative;z-index:1}
.ev-divider svg{display:block}
 
/* ── FOOTER ── */
.footer{max-width:900px;margin:0 auto;padding:32px clamp(20px,5vw,48px) 56px;border-top:1px solid var(--rule2);display:flex;flex-wrap:wrap;gap:12px;justify-content:space-between;align-items:center}
.ftext{font-family:var(--cond);font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
 
/* ── SCROLL REVEAL ── */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .55s ease,transform .55s ease}
.reveal.vis{opacity:1;transform:none}
 
/* ── RESPONSIVE ── */
@media(max-width:700px){
  .timeline::before{left:28px;transform:none}
  .event{grid-template-columns:56px 1fr;grid-template-rows:auto}
  .event .event-node{grid-column:1;grid-row:1;display:flex}
  .event .event-left{grid-column:2;grid-row:1;display:block;padding:0 0 0 16px}
  .event .event-right{grid-column:2;grid-row:1;display:block;padding:0 0 0 16px}
  .event.flip .event-left{grid-column:2;display:none}
  .event.flip .event-right{grid-column:2;display:block;padding:0 0 0 16px}
  .event.flip .event-node{grid-column:1}
  .event-left .event-card::after,.event-right .event-card::before{display:none}
  .scene-banner{display:none}
  .hero-art{display:none}
  .statbar{grid-template-columns:1fr 1fr}
  .sitem:nth-child(2){border-right:none}
  .sitem:nth-child(3){border-top:1px solid var(--rule)}
  .sitem:nth-child(4){border-top:1px solid var(--rule);border-right:none}
}
@media(max-width:420px){nav .nav-logo{display:none}}
</style>
</head>

function render(l){
  lang=l;
  const d=DATA[l];
  document.body.className=l==="en"?"":("lang-"+l);
  document.documentElement.lang=l;
  ["en","th","zh"].forEach(x=>document.getElementById("lb-"+x).classList.toggle("on",x===l));
  document.getElementById("eyebrow").textContent=d.eyebrow;
  const hedEl=document.getElementById("hero-hed");
  hedEl.innerHTML=d.hed.map((w,i)=>i===1?`<span class="acc">${w}</span>`:w).join("<br>");

  const si=document.querySelectorAll(".sitem");
  d.stats.forEach((s,i)=>{si[i].querySelector(".snum").textContent=s.n;si[i].querySelector(".snum").className="snum "+s.c;si[i].querySelector(".slbl").textContent=s.l});
  const tl=document.getElementById("tl-events");
  tl.innerHTML="";
  d.events.forEach((ev,idx)=>{
    const isFlip=idx%2===1;
    const div=document.createElement("div");
    div.className="event reveal"+(isFlip?" flip":"");
    const statHtml=`<div class="ev-stat ${ev.statc||""}"><span class="ev-stat-num">${ev.stat.n}</span><span class="ev-stat-lbl">${ev.stat.l}</span></div>`;
    const tagsHtml=ev.tags.map(t=>`<span class="ev-tag">${t}</span>`).join("");
    const iconColor=DOT_COLORS[ev.dot]||"currentColor";
    const wm=WATERMARKS[idx]||WATERMARKS[0];
    // replace currentColor in watermark with the dot color for tinting
    const wmTinted=wm.replace(/stroke="currentColor"/g,`stroke="${iconColor}"`);
    const cardHtml=`
      <div class="card-watermark">${wmTinted}</div>
      <div class="ev-date">${ev.date}</div>
      <h2 class="ev-hed">${ev.hed}</h2>
      <p class="ev-body">${ev.body}</p>
      ${statHtml}
      <div class="ev-tags">${tagsHtml}</div>`;
    const leftSlot=document.createElement("div");leftSlot.className="event-left";
    if(!isFlip)leftSlot.innerHTML=`<div class="event-card">${cardHtml}</div>`;
    const nodeSlot=document.createElement("div");nodeSlot.className="event-node";
    nodeSlot.innerHTML=`<div class="node-icon ${ev.dot}" style="color:${iconColor}">${ICONS[idx]||ICONS[0]}</div>`;
    const rightSlot=document.createElement("div");rightSlot.className="event-right";
    if(isFlip)rightSlot.innerHTML=`<div class="event-card">${cardHtml}</div>`;
    div.appendChild(leftSlot);div.appendChild(nodeSlot);div.appendChild(rightSlot);
    tl.appendChild(div);
    // add divider art between events (not after last)
    if(idx<d.events.length-1){
      const dvd=document.createElement("div");
      dvd.className="ev-divider";
      dvd.innerHTML=DIVIDERS[idx]||DIVIDERS[0];
      tl.appendChild(dvd);
    }
  });
  document.getElementById("fbrand").textContent=d.footer.brand;
  document.getElementById("furl").textContent=d.footer.url;
  document.getElementById("floc").textContent=d.footer.loc;
  observeReveal();
}
 
function setTheme(t){
  theme=t;
  document.body.setAttribute("data-theme",t);
  document.getElementById("theme-icon").textContent=t==="dark"?"☀️":"🌙";
  initCanvas();
}
function toggleTheme(){setTheme(theme==="dark"?"light":"dark")}
 
function observeReveal(){
  const els=document.querySelectorAll(".reveal:not(.vis)");
  if(!("IntersectionObserver" in window)){els.forEach(e=>e.classList.add("vis"));return}
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add("vis");obs.unobserve(e.target)}})},{threshold:.06});
  els.forEach(e=>obs.observe(e));
}
 
/* ── ANIMATED BACKGROUND CANVAS ── */
function initCanvas(){
  const cv=document.getElementById("bg-canvas");
  const ctx=cv.getContext("2d");
  let W,H,dots=[],raf;
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight}
  resize();
  window.addEventListener("resize",resize);
  const isDark=theme==="dark";
  const dotColor=isDark?"rgba(232,93,32,":"rgba(24,22,18,";
  const lineColor=isDark?"rgba(58,143,212,":"rgba(24,22,18,";
  // create grid dots
  dots=[];
  const spacing=42;
  for(let x=0;x<2000;x+=spacing)for(let y=0;y<2000;y+=spacing)dots.push({x,y,ox:x,oy:y,phase:Math.random()*Math.PI*2,speed:.4+Math.random()*.4});
  function draw(t){
    ctx.clearRect(0,0,W,H);
    dots.forEach(d=>{
      const drift=Math.sin(t*.0006+d.phase)*2;
      d.x=d.ox+drift;d.y=d.oy+drift*.5;
      const alpha=isDark?(.15+.08*Math.sin(t*.001+d.phase)):(.06+.03*Math.sin(t*.001+d.phase));
      ctx.beginPath();ctx.arc(d.x,d.y,1,0,Math.PI*2);
      ctx.fillStyle=dotColor+alpha+")";ctx.fill();
    });
    // draw faint grid lines
    ctx.strokeStyle=lineColor+(isDark?.04:.025)+")";
    ctx.lineWidth=0.5;
    for(let x=0;x<2000;x+=spacing){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,2000);ctx.stroke()}
    for(let y=0;y<2000;y+=spacing){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(2000,y);ctx.stroke()}
    raf=requestAnimationFrame(draw);
  }
  if(raf)cancelAnimationFrame(raf);
  raf=requestAnimationFrame(draw);
}
</script>
